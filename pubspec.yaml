name: my_vpn
description: "TeleOpen VPN Project"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
dependencies:
  flutter:
    sdk: flutter
  flutter_v2ray:
    git:
      url: https://github.com/blueboy-tm/flutter_v2ray
      ref: main
  http: ^1.2.0
  intl: ^0.20.2
  provider: ^6.1.2
  shared_preferences: ^2.5.5
  url_launcher: ^6.3.2
  image_picker: ^1.1.2
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.0.0
  installed_apps: ^1.4.0
  flutter_local_notifications: ^17.0.0
  path_provider: ^2.1.4
  cupertino_icons: ^1.0.9
  flutter_internet_speed_test_pro: ^1.5.1
dev_dependencies:
  flutter_test:
  flutter_lints: ^3.0.0
flutter:
  uses-material-design: true

  assets:
    - assets/world_map.png
    - assets/hysteria2
    - assets/telegram.png

dependency_overrides:
  flutter_test:
    sdk: flutter
